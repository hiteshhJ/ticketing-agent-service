bosun:
  deployment:
    type: app
    config:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 75
      deploymentTimeout: 7m
      serviceName: agent-service
      serviceMonitor:
        endpoints:
          - honorLabels: true
            interval: 15s
            path: /actuator/prometheus
            scrapeTimeout: 10s
            targetPort: 8080
      replicaCount: 1
      service:
        ports:
          - port: 80
            name: http
      container:
        ports:
          - port: 8080
            name: http
        livenessHealthcheckPort: 8080
        livenessHealthcheckPath: /actuator/health/liveness
        livenessPeriodSeconds: 30
        livenessTimeoutSeconds: 5
        livenessFailureThreshold: 3
        readinessHealthcheckPort: 8080
        readinessHealthcheckPath: /actuator/health/readiness
        readinessInitialDelaySeconds: 20
        readinessTimeoutSeconds: 5
      resources:
        requests:
          cpu: "1"
          memory: 2048Mi
        limits:
          cpu: "2"
          memory: 2048Mi
      istio:
        authorizationPolicy:
          main:
            action: ALLOW
            rules:
              - to:
                  - operation:
                      paths: [ "/actuator/*" ]
                      methods: [ "GET" ]
              - to:
                  - operation:
                      paths: [ "/swagger-ui/*", "/v3/api-docs*", "/chat", "/health" ]
                      methods: [ "GET", "POST", "PUT", "DELETE", "OPTIONS" ]
    configOverride:
      dev: src/main/resources/env/dev.yml
      stg: src/main/resources/env/stg.yml
      prd: src/main/resources/env/prd.yml