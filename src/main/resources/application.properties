# Server Configuration
server.port=8082
spring.application.name=ticketing-agent-service
# Logging
logging.level.root=INFO
logging.level.com.sainsburys.agent=INFO
# Azure OpenAI Configuration
azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT}
azure.openai.api-key=${AZURE_OPENAI_API_KEY}
azure.openai.deployment-name=${AZURE_OPENAI_DEPLOYMENT_NAME}
# MongoDB Configuration
spring.data.mongodb.promotion-uri=${MONGODB_PROMOTION_URI}
spring.data.mongodb.price-history-uri=${MONGODB_PRICE_HISTORY_URI}
# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://sts.windows.net/${AZURE_TENANT_ID}/
spring.security.oauth2.resourceserver.jwt.audiences=api://${AZURE_CLIENT_ID}