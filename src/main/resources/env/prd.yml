resources:
  requests:
    cpu: "1"
    memory: 2048Mi
  limits:
    cpu: "2"
    memory: 4096Mi
annotations:
  "downscaler/downtime": "Mon-Sun 03:00-17:59 Europe/London"
envVariables:
  applicationName: "ticketing-agent-service"
  SPRING_PROFILE_ACTIVE: "prd"
  # Azure OpenAI Configuration
  AZURE_OPENAI_ENDPOINT: "vault:secret/data/ticketing/agent-service/azure-openai/#endpoint"
  AZURE_OPENAI_API_KEY: "vault:secret/data/ticketing/agent-service/azure-openai/#api-key"
  AZURE_OPENAI_DEPLOYMENT_NAME: "vault:secret/data/ticketing/agent-service/azure-openai/#deployment-name"
  # MongoDB Configuration
  MONGODB_PROMOTION_URI: "vault:secret/data/ticketing/agent-service/mongodb/#promotion-uri"
  MONGODB_PRICE_HISTORY_URI: "vault:secret/data/ticketing/agent-service/mongodb/#price-history-uri"
  # Azure AD Authentication
  azureTenantId: "vault:secret/data/ticketing/ticketing-app#AUTH_MICROSOFT_ENTRA_ID_TENANT_ID"
  azureClientId: "vault:secret/data/ticketing/ticketing-app#AUTH_MICROSOFT_ENTRA_ID_CLIENT_ID"
  azureClientSecret: "vault:secret/data/ticketing/ticketing-app#AUTH_MICROSOFT_ENTRA_ID_CLIENT_SECRET"
